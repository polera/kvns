<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid_v1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E2E8F0" stroke-width="1"/>
    </pattern>
    <mask id="stripeMask_v1">
      <rect width="100%" height="100%" fill="black"/>
      <g>
        <rect y="0" width="100%" height="10" fill="white"/>
        <rect y="20" width="100%" height="10" fill="white"/>
        <rect y="40" width="100%" height="10" fill="white"/>
        <rect y="60" width="100%" height="10" fill="white"/>
        <rect y="80" width="100%" height="10" fill="white"/>
        <rect y="100" width="100%" height="10" fill="white"/>
        <rect y="120" width="100%" height="10" fill="white"/>
        <rect y="140" width="100%" height="10" fill="white"/>
        <rect y="160" width="100%" height="10" fill="white"/>
      </g>
    </mask>
  </defs>

  <!-- Clean White Canvas -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <rect width="100%" height="100%" fill="url(#grid_v1)"/>

  <!-- Logo Container -->
  <g transform="translate(70, 130)">
    <!-- Base Text - Solid Heavy Weight -->
    <text font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="900" font-size="180" 
          fill="#0075BF" letter-spacing="-8">
      KVNS
    </text>
    
    <!-- Interlaced Overlay (slightly lighter blue or white to cut) -->
    <text font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="900" font-size="180" 
          fill="#FFFFFF" mask="url(#stripeMask_v1)" letter-spacing="-8" opacity="1">
      KVNS
    </text>
  </g>
  
  <!-- Subtext -->
  <text x="300" y="320" font-family="Helvetica Neue, sans-serif" font-size="14" fill="#64748B" text-anchor="middle" letter-spacing="4">
    KEY VALUE NAMESPACE STORE
  </text>
</svg>
