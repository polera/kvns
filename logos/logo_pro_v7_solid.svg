<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid_v7" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#FFF7ED"/> <!-- Warm White -->
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#FFEDD5" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid_v7)"/>

  <g transform="translate(100, 200)">
    <!-- Long Shadow -->
    <path d="M0 0 L150 150 L500 150 L350 0 Z" fill="#FED7AA" opacity="0.5"/> 
    
    <!-- Text -->
    <text x="0" y="0" font-family="Impact, sans-serif" font-size="180" fill="#EA580C" letter-spacing="2">
      KVNS
    </text>
    
    <!-- Overlay Stroke -->
    <text x="0" y="0" font-family="Impact, sans-serif" font-size="180" fill="none" stroke="#9A3412" stroke-width="2" letter-spacing="2">
      KVNS
    </text>
  </g>
</svg>
