<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow_v5">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#F1F5F9"/>
  
  <g transform="translate(300, 200)">
    <!-- Abstract K / V shape -->
    <!-- Central Curve -->
    <path d="M-60 -60 Q 0 0 60 -60" stroke="#0075BF" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M-60 60 Q 0 0 60 60" stroke="#0F172A" stroke-width="20" fill="none" stroke-linecap="round"/>
    
    <!-- Vertical Line -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#FB923C" stroke-width="20" stroke-linecap="round"/>
  </g>

  <text x="300" y="320" font-family="Arial, sans-serif" font-weight="bold" font-size="40" 
        fill="#334155" text-anchor="middle" letter-spacing="10">
    KVNS
  </text>
</svg>
