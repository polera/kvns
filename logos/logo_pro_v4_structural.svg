<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid_v4" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="#0075BF"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.5"/>
      <path d="M 0 0 L 50 50" fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid_v4)"/>

  <!-- Blueprint Lines -->
  <g transform="translate(80, 150)" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="square">
    <!-- K -->
    <path d="M0 0 V100" />
    <path d="M0 50 L50 0" />
    <path d="M0 50 L50 100" />
    
    <!-- V -->
    <path d="M70 0 L95 100 L120 0" />
    
    <!-- N -->
    <path d="M140 100 V0 L190 100 V0" />
    
    <!-- S -->
    <path d="M210 100 H260 V50 H210 V0 H260" />

    <!-- Measurement Lines -->
    <path d="M-20 0 H-10 M-20 100 H-10 M-15 0 V100" stroke-width="1" opacity="0.5"/>
    <text x="-40" y="55" fill="white" font-family="monospace" font-size="10" opacity="0.8" transform="rotate(-90 -40 55)">100px</text>
  </g>
  
  <rect x="50" y="320" width="200" height="60" fill="none" stroke="white" stroke-width="2"/>
  <text x="60" y="340" fill="white" font-family="monospace" font-size="10">PROJECT: KVNS</text>
  <text x="60" y="355" fill="white" font-family="monospace" font-size="10">SCALE: 1:1</text>
  <text x="60" y="370" fill="white" font-family="monospace" font-size="10">APP: BLUEPRINT</text>
</svg>
