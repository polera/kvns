<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Honolulu Blue Badge -->
  <rect width="100%" height="100%" fill="#F1F5F9"/>
  
  <g transform="translate(300, 200)">
    <!-- Badge Shield -->
    <path d="M-150 -150 H150 V50 C150 150 0 200 0 200 C0 200 -150 150 -150 50 Z" fill="#0075BF"/>
    <path d="M-140 -140 H140 V50 C140 140 0 190 0 190 C0 190 -140 140 -140 50 Z" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.5"/>

    <!-- Text -->
    <text x="0" y="10" font-family="Times New Roman, serif" font-weight="bold" font-size="100" fill="#FFFFFF" text-anchor="middle">
      KVNS
    </text>
    
    <!-- Accents -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="16" fill="#BAE6FD" text-anchor="middle" letter-spacing="4">
      HONOLULU EST. 2026
    </text>
    
    <!-- Star -->
    <path d="M0 -100 L10 -70 L40 -70 L15 -50 L25 -20 L0 -40 L-25 -20 L-15 -50 L-40 -70 L-10 -70 Z" fill="#FBBF24"/>
  </g>
</svg>
