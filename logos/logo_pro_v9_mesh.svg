<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="meshGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0075BF"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <mask id="textMaskMesh">
      <rect width="100%" height="100%" fill="black"/>
      <text x="300" y="250" font-family="Arial, sans-serif" font-weight="900" font-size="200" fill="white" text-anchor="middle">
        KVNS
      </text>
    </mask>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>
  
  <!-- Mesh Background masked by text -->
  <rect width="100%" height="100%" fill="url(#meshGrad)" mask="url(#textMaskMesh)"/>
  
  <!-- Subtle Grid Overlay on text -->
  <g mask="url(#textMaskMesh)">
    <path d="M0 0 L600 400" stroke="white" stroke-width="1" opacity="0.2"/>
    <path d="M600 0 L0 400" stroke="white" stroke-width="1" opacity="0.2"/>
  </g>
</svg>
