<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid_v2" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#CBD5E1"/>
    </pattern>
    <filter id="shadow_v2">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0075BF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#F8FAFC"/>
  <rect width="100%" height="100%" fill="url(#grid_v2)"/>

  <g transform="translate(150, 100)">
    <!-- Monogram K - Constructed from geometric shapes -->
    <path d="M0 0 H40 V200 H0 Z" fill="#0F172A"/> <!-- Vertical Bar -->
    <path d="M40 100 L120 20 H160 L70 110 Z" fill="#0075BF"/> <!-- Top Arm -->
    <path d="M70 90 L160 200 H120 L40 100 Z" fill="#0075BF"/> <!-- Bottom Arm -->

    <!-- V - Interlocking -->
    <path d="M140 0 H180 L230 200 H190 Z" fill="#0F172A" opacity="0.9"/> <!-- Left Leg -->
    <path d="M280 0 H240 L190 200 H230 Z" fill="#0075BF" opacity="0.9"/> <!-- Right Leg -->
    
    <!-- NS stylized as data dots -->
    <circle cx="340" cy="180" r="15" fill="#FB923C"/>
    <circle cx="380" cy="180" r="15" fill="#FB923C" opacity="0.6"/>
    <circle cx="420" cy="180" r="15" fill="#FB923C" opacity="0.3"/>
  </g>
</svg>
