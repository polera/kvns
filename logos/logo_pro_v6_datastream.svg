<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="streamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0075BF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0075BF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>
  
  <!-- Data Streams -->
  <g transform="translate(50, 100)">
     <!-- Stream 1 -->
     <rect x="0" y="20" width="300" height="4" fill="url(#streamGrad)"/>
     <rect x="0" y="30" width="250" height="4" fill="url(#streamGrad)" opacity="0.6"/>
     <rect x="0" y="40" width="280" height="4" fill="url(#streamGrad)" opacity="0.3"/>

     <!-- The Text Emerging -->
     <text x="310" y="60" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#0075BF">
       KVNS
     </text>
     
     <!-- Stream Continuing -->
     <rect x="550" y="20" width="50" height="4" fill="#0075BF" opacity="0.2"/>
  </g>
  
  <!-- Subtext -->
  <text x="310" y="180" font-family="Arial, sans-serif" font-size="24" fill="#64748B" letter-spacing="1">
    High Performance Store
  </text>
</svg>
