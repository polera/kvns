<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid_v3" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <filter id="glow_v3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid_v3)" opacity="0.3"/>

  <g transform="translate(50, 220)">
    <text font-family="Menlo, Monaco, 'Courier New', monospace" font-weight="bold" font-size="140" 
          fill="#38BDF8" filter="url(#glow_v3)" letter-spacing="-5">
      &gt;KVNS_
    </text>
    <!-- Cursor Block -->
    <rect x="520" y="-110" width="30" height="120" fill="#FB923C">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
